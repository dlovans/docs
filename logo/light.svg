<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 32 32" fill="none">
	<!-- QR-finder mark — matches uipv2-web favicon.svg exactly. Light mode: black. -->
	<!-- Top-left: thick square border + inner dot -->
	<rect x="0" y="0" width="11" height="11" fill="none" stroke="#0A0A0B" stroke-width="2"/>
	<rect x="3" y="3" width="5" height="5" fill="#0A0A0B"/>
	<!-- Top-right -->
	<rect x="21" y="0" width="11" height="11" fill="none" stroke="#0A0A0B" stroke-width="2"/>
	<rect x="24" y="3" width="5" height="5" fill="#0A0A0B"/>
	<!-- Bottom-left -->
	<rect x="0" y="21" width="11" height="11" fill="none" stroke="#0A0A0B" stroke-width="2"/>
	<rect x="3" y="24" width="5" height="5" fill="#0A0A0B"/>
	<!-- Center alignment cluster — always vermillion -->
	<rect x="14" y="14" width="4" height="4" fill="#E34234"/>
	<rect x="20" y="14" width="2" height="2" fill="#E34234" opacity="0.6"/>
	<rect x="14" y="20" width="2" height="2" fill="#E34234" opacity="0.6"/>
</svg>
