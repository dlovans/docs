<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 32 32" fill="none">
	<style>
		.stroke { stroke: #0A0A0B; }
		.fill   { fill:   #0A0A0B; }
		.accent { fill:   #E34234; }
		@media (prefers-color-scheme: dark) {
			.stroke { stroke: #F4F2EC; }
			.fill   { fill:   #F4F2EC; }
		}
	</style>

	<!-- Top-left finder pattern -->
	<rect class="stroke" x="0" y="0" width="11" height="11" stroke-width="2" />
	<rect class="fill"   x="3" y="3" width="5"  height="5" />

	<!-- Top-right finder pattern -->
	<rect class="stroke" x="21" y="0" width="11" height="11" stroke-width="2" />
	<rect class="fill"   x="24" y="3" width="5"  height="5" />

	<!-- Bottom-left finder pattern -->
	<rect class="stroke" x="0" y="21" width="11" height="11" stroke-width="2" />
	<rect class="fill"   x="3" y="24" width="5"  height="5" />

	<!-- Center alignment marker (vermillion — always) -->
	<rect class="accent" x="14" y="14" width="4" height="4" />
	<rect class="accent" x="20" y="14" width="2" height="2" opacity="0.6" />
	<rect class="accent" x="14" y="20" width="2" height="2" opacity="0.6" />
</svg>
